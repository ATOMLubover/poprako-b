services:
  napcat:
    environment:
      - NAPCAT_UID=${NAPCAT_UID:-1000}
      - NAPCAT_GID=${NAPCAT_GID:-1000}
    ports:
      - 3000:3000
      - 3001:3001
      - 6099:6099
    container_name: napcat
    restart: always
    image: mlikiowa/napcat-docker:latest
    networks:
      - poprako-net

  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: poprako-b
    restart: always
    env_file:
      - .env
    environment:
      - RUST_LOG=${RUST_LOG:-info}
      - NAPCAT_REVERSE_WS_HOST=0.0.0.0
      - NAPCAT_REVERSE_WS_PORT=8080
      - NAPCAT_REVERSE_WS_SUFFIX=onebot/v11
      - NAPCAT_ACCESS_TOKEN=${NAPCAT_ACCESS_TOKEN}
    expose:
      - "8080"
    networks:
      - poprako-net

networks:
  poprako-net:
    driver: bridge
